openapi: 3.1.0
info:
  title: Trip Planner вҖ” Calendar Import API
  version: 0.1.0
  description: |
    мҷёл¶Җ мәҳлҰ°лҚ”(GoogleВ·Apple)мқҳ мқҙлІӨнҠёлҘј trip-plannerмқҳ draft activityлЎң к°Җм ёмҳЁлӢӨ.
    Spec: specs/027-external-calendar-import/spec.md

servers:
  - url: https://trip.idean.me/api
    description: production
  - url: https://dev.trip.idean.me/api
    description: dev

security:
  - sessionCookie: []

paths:
  /trips/{tripId}/calendar-import:
    post:
      operationId: importTripFromExternalCalendar
      summary: мҷёл¶Җ мәҳлҰ°лҚ”м—җм„ң tripмңјлЎң мқјм • import (мҲҳлҸҷ нҠёлҰ¬кұ°)
      description: |
        нҳём¶ңмһҗк°Җ м„ нғқн•ң мҷёл¶Җ мәҳлҰ°лҚ”мқҳ мқҙлІӨнҠёл“Өмқ„ trip кё°к°„кіј кІ№м№ҳлҠ” лІ”мң„м—җм„ң
        `ActivityDraft`лЎң к°Җм ёмҳЁлӢӨ. л©ұл“ұм„ұ ліҙмһҘ: (provider, externalCalendarId,
        externalEventId) нӮӨлЎң кё°мЎҙ draftк°Җ мһҲмңјл©ҙ мғҲлЎң л§Ңл“Өм§Җ м•Ҡкі  skip м№ҙмҡҙнҠёл§Ң мҰқк°Җ.
        к¶Ңн•ң: tripмқҳ OWNER лҳҗлҠ” HOST. GUESTлҠ” 403.
      parameters:
        - in: path
          name: tripId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarImportRequest"
      responses:
        "200":
          description: import мҷ„лЈҢ. кІ°кіј мҡ”м•Ҫ л°ҳнҷҳ.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarImportResult"
        "400":
          description: мһҳлӘ»лҗң мҡ”мІӯ (provider/calendarId лҲ„лқҪ л“ұ)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: лҜёмқёмҰқ
        "403":
          description: к¶Ңн•ң л¶ҖмЎұ (GUEST лҳҗлҠ” trip л№„л©ӨлІ„)
        "404":
          description: trip лҳҗлҠ” мҷёл¶Җ мәҳлҰ°лҚ”лҘј м°ҫмқ„ мҲҳ м—ҶмқҢ
        "409":
          description: мҷёл¶Җ кі„м • лҜём—°кІ° вҖ” /settings/calendarsлЎң м•ҲлӮҙ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/external-calendars:
    get:
      operationId: listMyExternalCalendars
      summary: мӮ¬мҡ©мһҗк°Җ м—°кІ°н•ң мҷёл¶Җ кі„м •мқҳ мәҳлҰ°лҚ” лӘ©лЎқ
      description: |
        GoogleВ·Apple лӘЁл‘җ н•©міҗм„ң л°ҳнҷҳ. trip-plannerк°Җ л§Ңл“  мәҳлҰ°лҚ”лҠ” м ңмҷё(`isManagedByTripPlanner=true`мқё
        мәҳлҰ°лҚ” м ңмҷё). ліё APIмқҳ кІ°кіјлҘј мәҳлҰ°лҚ” м„ нғқ лӘЁлӢ¬м—җ н‘ңмӢңн•ңлӢӨ.
      responses:
        "200":
          description: мҷёл¶Җ мәҳлҰ°лҚ” лӘ©лЎқ
          content:
            application/json:
              schema:
                type: object
                properties:
                  calendars:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExternalCalendar"
        "401":
          description: лҜёмқёмҰқ

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: authjs.session-token

  schemas:
    CalendarImportRequest:
      type: object
      required: [provider, externalCalendarId]
      properties:
        provider:
          type: string
          enum: [GOOGLE, APPLE]
        externalCalendarId:
          type: string
          description: мҷёл¶Җ мәҳлҰ°лҚ” мӢқлі„мһҗ. Google calendarId лҳҗлҠ” Apple CalDAV href.

    CalendarImportResult:
      type: object
      required: [importRunId, importedCount, skippedCount, failedCount]
      properties:
        importRunId:
          type: integer
        importedCount:
          type: integer
          description: мӢ к·ң мғқм„ұлҗң draft мҲҳ
        skippedCount:
          type: integer
          description: мқҙлҜё draftк°Җ мЎҙмһ¬н•ҙ кұҙл„Ҳлӣҙ мҷёл¶Җ мқҙлІӨнҠё мҲҳ
        failedCount:
          type: integer
          description: fetchВ·л§Өн•‘ мӢӨнҢЁ мқҙлІӨнҠё мҲҳ
        failedTitles:
          type: array
          maxItems: 3
          items:
            type: string
          description: мӢӨнҢЁ мқҙлІӨнҠёмқҳ мҷёл¶Җ м ңлӘ© мІ« 3кұҙ(privacy кі л Өн•ҙ titleл§Ң)

    ExternalCalendar:
      type: object
      required: [provider, externalCalendarId, name]
      properties:
        provider:
          type: string
          enum: [GOOGLE, APPLE]
        externalCalendarId:
          type: string
        name:
          type: string
          description: мҷёл¶Җ мәҳлҰ°лҚ” мқҙлҰ„(мӮ¬мҡ©мһҗк°Җ ліё к·ёлҢҖлЎң)
        accountLabel:
          type: string
          description: м–ҙлҠҗ мҷёл¶Җ кі„м •м—җ мҶҚн•ҳлҠ”м§Җ(мҳҲ: "user@gmail.com")
        isManagedByTripPlanner:
          type: boolean
          description: trip-plannerк°Җ л§Ңл“  мәҳлҰ°лҚ”мқём§Җ. trueл©ҙ import лҢҖмғҒм—җм„ң м ңмҷё.

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: EXTERNAL_ACCOUNT_NOT_LINKED
        message:
          type: string
        details:
          type: object
          additionalProperties: true

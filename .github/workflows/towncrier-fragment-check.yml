name: Towncrier Fragment Check

on:
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 면제 확인 (chore-no-news 라벨 / release 브랜치 / dependabot)
        id: label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # release/* 브랜치 PR, dependabot/* PR 은 fragment 면제 (towncrier build 소비 / 봇 자동 PR)
          if echo "$LABELS" | grep -q '"chore-no-news"' \
             || [[ "$HEAD_REF" == release/* ]] \
             || [[ "$HEAD_REF" == dependabot/* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 변경 파일 목록
        id: diff
        if: steps.label.outputs.skip == 'false'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed-files.txt
          cat /tmp/changed-files.txt

      - name: changes/ 단편 또는 면제 경로 검증
        if: steps.label.outputs.skip == 'false'
        run: |
          # 새로 추가된 changes/*.md 단편 확인 (README.md, _template.* 제외)
          if git diff --name-only --diff-filter=A "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
              | grep -E '^changes/[^/]+\.(breaking|feat|fix|removed|docs|chore)\.md$' > /dev/null; then
            echo "✅ towncrier 단편 추가 확인됨"
            exit 0
          fi

          # 면제 경로만 변경된 PR은 통과
          # 면제: .github/, .specify/, docs/lessons/, changes/ 자체
          if ! grep -vE '^(\.github/|\.specify/|docs/lessons/|changes/)' /tmp/changed-files.txt > /dev/null; then
            echo "✅ 면제 경로만 변경됨 (단편 불필요)"
            exit 0
          fi

          echo "::error::changes/<이슈번호>.<타입>.md 단편이 PR에 포함되어야 합니다."
          echo "::error::예외 시: 'chore-no-news' 라벨을 PR에 부착하세요."
          echo "::error::가이드: changes/README.md"
          exit 1

name: Auto Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 버전 추출
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: CHANGELOG에서 릴리즈 노트 추출
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # CHANGELOG.md에서 해당 버전 섹션 추출
          # ## [X.Y.Z] 부터 다음 ## [ 까지
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="릴리즈 노트가 CHANGELOG.md에 없습니다. 커밋 로그를 확인하세요."
          fi

          # GitHub Actions 멀티라인 출력
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: GitHub Release 생성
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: 의존성 설치
        run: npm ci
      - name: ESLint 실행
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: 의존성 설치
        run: npm ci
      - name: TypeScript 타입체크
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: 의존성 설치
        run: npm ci
      - name: 테스트 실행
        run: npm test
      - name: 커버리지 측정 (threshold lines 100 / branches 95 / statements 100 / functions 100)
        run: npm run test:coverage

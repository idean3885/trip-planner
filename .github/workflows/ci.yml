name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: 의존성 설치
        run: npm ci
      - name: ESLint 실행
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: 의존성 설치
        run: npm ci
      - name: TypeScript 타입체크
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: 의존성 설치
        run: npm ci
      - name: 테스트 실행
        run: npm test
      # coverage threshold는 현재 baseline(Branches 92.8% / Statements 99.19%)이
      # 목표(95% / 100%) 미달. 추적 이슈 #282에서 복원 작업 후
      # 이 블록의 continue-on-error 제거하여 blocking으로 전환한다.
      - name: 커버리지 측정 (threshold 미달 허용 — #282 복원 전까지 non-blocking)
        run: npm run test:coverage
        continue-on-error: true
